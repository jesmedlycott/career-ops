# Portal Scanner Configuration — Jason Medlycott
# Target: Fundraising, Programme Management, Conservation/NGO roles — Asia Pacific
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)

# -- Title filter --
title_filter:
  positive:
    # -- Fundraising & Development --
    - "Fundraising"
    - "Development Officer"
    - "Development Manager"
    - "Resource Mobilisation"
    - "Resource Mobilization"
    - "Donor Relations"
    - "Major Gifts"
    - "Philanthropy"
    - "Grants"
    - "Grant Writer"
    - "Grant Manager"
    - "Bid Manager"
    - "Bid Writer"
    - "Partnerships"
    - "Corporate Partnerships"
    - "Institutional Funding"
    # -- Programme & Project Management --
    - "Programme Manager"
    - "Program Manager"
    - "Programme Officer"
    - "Program Officer"
    - "Project Manager"
    - "Project Officer"
    # -- Conservation & Environment --
    - "Conservation"
    - "Marine"
    - "Ocean"
    - "Environment"
    - "Environmental"
    - "Coastal"
    - "Blue Economy"
    - "Climate"
    - "Sustainability"
    - "Wildlife"
    - "Biodiversity"
    # -- Community & Engagement --
    - "Community Engagement"
    - "Stakeholder Engagement"
    - "Outreach"
    # -- NGO / Non-profit --
    - "Non-profit"
    - "Nonprofit"
    - "NGO"
    - "Social Impact"
    - "International Development"
  negative:
    - "Intern"
    - "Junior"
    - "Entry Level"
    - "Data Scientist"
    - "Software Engineer"
    - "Developer"
    - "IT "
    - "Finance Manager"  # accounting role vs conservation finance
    - "Accountant"
    - "Legal"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries --
search_queries:

  # -- Conservation job boards --
  - name: Conservation Careers — Fundraising
    query: 'site:conservation-careers.com "fundraising" OR "development officer" OR "grants" Asia Pacific OR Thailand OR Southeast Asia'
    enabled: true

  - name: Conservation Careers — Programme Manager
    query: 'site:conservation-careers.com "programme manager" OR "program manager" OR "conservation" Asia Pacific OR marine OR ocean'
    enabled: true

  - name: Idealist — Marine/Ocean Conservation
    query: 'site:idealist.org "marine" OR "ocean" OR "conservation" "fundraising" OR "programme" OR "development" Asia Pacific'
    enabled: true

  - name: Idealist — Fundraising NGO Asia
    query: 'site:idealist.org "fundraising manager" OR "development officer" OR "grants manager" Asia OR Southeast Asia OR Thailand'
    enabled: true

  - name: ReliefWeb — Programme Manager
    query: 'site:reliefweb.int "programme manager" OR "program officer" conservation OR environment Asia Pacific'
    enabled: true

  - name: ReliefWeb — Resource Mobilisation
    query: 'site:reliefweb.int "resource mobilisation" OR "fundraising" OR "grants" Asia Pacific OR Southeast Asia'
    enabled: true

  - name: Devex — Conservation Fundraising
    query: 'site:devex.com "fundraising" OR "development officer" OR "resource mobilisation" conservation OR marine OR ocean Asia Pacific'
    enabled: true

  - name: Devex — Programme Manager Asia
    query: 'site:devex.com "programme manager" OR "program manager" environment OR conservation Asia OR Southeast Asia'
    enabled: true

  - name: LinkedIn — Marine Conservation Fundraising
    query: '"marine conservation" OR "ocean conservation" "fundraising" OR "development manager" OR "partnerships" Asia Pacific'
    enabled: true

  - name: LinkedIn — NGO Programme Manager Thailand
    query: '"programme manager" OR "program manager" NGO OR "non-profit" Thailand OR "Southeast Asia" OR "Asia Pacific" conservation OR environment'
    enabled: true

  # -- WWF / major conservation orgs --
  - name: WWF Jobs — Asia Pacific
    query: 'site:careers.wwf.org.uk OR site:wwf.org.au/about-us/careers "fundraising" OR "programme" OR "partnerships" Asia OR Pacific'
    enabled: true

  - name: IUCN Jobs
    query: 'site:iucn.org/jobs "fundraising" OR "programme manager" OR "resource mobilisation" OR "partnerships"'
    enabled: true

  # -- Broad NGO boards --
  - name: CharityJob — Fundraising
    query: 'site:charityjob.co.uk "fundraising manager" OR "development manager" OR "grants manager" international OR remote'
    enabled: true

  - name: Third Sector — Fundraising Asia
    query: 'site:thirdsector.co.uk "fundraising" OR "development" "Asia" OR "international" conservation OR environment'
    enabled: true

  - name: NGO Connect — Conservation roles
    query: '"NGO" "fundraising" OR "programme manager" "marine" OR "ocean" OR "conservation" Asia Pacific remote'
    enabled: true

# -- Tracked organisations --

  # -- Global conservation orgs --

  - name: WWF International
    careers_url: https://careers.wwf.org.uk
    scan_method: websearch
    scan_query: 'site:careers.wwf.org.uk "fundraising" OR "programme" OR "partnerships" OR "development"'
    notes: "Global. Strong Asia Pacific presence. Fundraising and programme roles."
    enabled: true

  - name: WWF Australia
    careers_url: https://www.wwf.org.au/about-us/careers
    scan_method: websearch
    scan_query: 'site:wwf.org.au "fundraising" OR "programme" OR "marine" OR "conservation"'
